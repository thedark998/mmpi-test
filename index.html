<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <title>MMPI-2 PRO Analyzer - Versione Integrata</title>
    <style>
        :root { --p: #007bff; --v: #28a745; --f: #dc3545; --bg: #f8f9fa; --dark: #343a40; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; touch-action: manipulation; }
        
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 900px; box-sizing: border-box; }
        
        /* Header & Info */
        .header-info { display: flex; justify-content: space-between; font-weight: bold; color: #555; font-size: 1rem; margin-bottom: 5px; }
        .timer-box { color: var(--p); font-family: monospace; font-size: 1.2rem; }
        
        /* Progress Bar */
        .progress-container { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--p); width: 0%; transition: 0.3s; }

        /* Area Domanda */
        .q-text { font-size: 1.4rem; min-height: 110px; margin: 20px 0; font-weight: 500; color: #222; line-height: 1.5; display: flex; align-items: center; justify-content: center; text-align: center; }

        /* Pulsanti Grandi (Smartphone & PC) */
        .btns { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-ans { flex: 1; padding: 25px; border: 3px solid #ddd; border-radius: 15px; font-size: 1.5rem; font-weight: bold; cursor: pointer; background: white; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-v { color: var(--v); border-color: var(--v); }
        .btn-v.active { background: var(--v); color: white; }
        .btn-f { color: var(--f); border-color: var(--f); }
        .btn-f.active { background: var(--f); color: white; }

        /* Navigazione Secondaria */
        .nav-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-nav { padding: 15px; border: none; border-radius: 10px; background: #6c757d; color: white; font-weight: bold; cursor: pointer; }
        .btn-jump { background: #e67e22; }

        /* Dashboard Analisi (Review Screen) */
        #review-screen { display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 15px; border-radius: 12px; border-left: 5px solid var(--p); box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .stat-label { font-size: 0.75rem; color: #7f8c8d; text-transform: uppercase; display: block; }
        .stat-val { font-size: 1.3rem; font-weight: bold; color: var(--dark); }

        .missing-alert { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: bold; cursor: pointer; border: 1px solid #ffeeba; }

        .grid-ans { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 6px; max-height: 40vh; overflow-y: auto; padding: 10px; background: #f8f9fa; border-radius: 10px; border: 1px solid #eee; }
        .tile { padding: 12px 0; text-align: center; border-radius: 6px; font-size: 0.85rem; font-weight: bold; color: white; cursor: pointer; }
        .t-v { background: var(--v); } .t-f { background: var(--f); } .t-n { background: #ccc; color: #666; }
        .t-crit { outline: 3px solid black; outline-offset: -3px; }

        @media (max-width: 600px) {
            .q-text { font-size: 1.15rem; }
            .btn-ans { padding: 20px; font-size: 1.2rem; }
        }
    </style>
</head>

</div>

        localStorage.setItem('mmpi_p8_times', JSON.stringify(reactionTimes));
    }

    function handleAns(val) {
        let elapsed = (Date.now() - startTime) / 1000;
        reactionTimes[currentIdx] = Math.round(elapsed);
        responses[currentIdx] = val;

        if(isRecovering) {
            missingQueue.shift();
            if(missingQueue.length > 0) {
                currentIdx = missingQueue[0];
                render();
            } else {
                isRecovering = false;
                openReview();
            }
        } else {
            if(currentIdx < 566) { currentIdx++; render(); } 
            else { openReview(); }
        }
    }

    function changeQ(dir) {
        if(currentIdx + dir >= 0 && currentIdx + dir < 567) {
            currentIdx += dir;
            render();
        }
    }

    function jumpTo() {
        let n = prompt("Vai al numero:");
        if(n >= 1 && n <= 567) { currentIdx = parseInt(n)-1; render(); }
    }

    // --- REVISIONE E ANALISI ---
    function openReview() {
        isReviewing = true;
        document.getElementById('test-screen').style.display = "none";
        document.getElementById('review-screen').style.display = "block";
        
        let missing = [];
responses.forEach((r, i) => { 
    if(r === null) missing.push(i); 
});

document.getElementById('missing-count').innerText = missing.length;
document.getElementById('missing-box').style.display = missing.length > 0 ? "block" : "none";

let missingList = document.getElementById("missing-list");

if(!missingList){
    missingList = document.createElement("div");
    missingList.id = "missing-list";

}

missingList.innerHTML = "";

missing.forEach(i => {

    const btn = document.createElement("button");

    btn.innerText = i + 1;

    btn.style.color = "white";

    btn.style.cursor = "pointer";

    btn.onclick = () => {

        closeReview();

    missingList.appendChild(btn);

});

        // VRIN
        let cohErr = 0;
        vrinPairs.forEach(p => {
            if(responses[p[0]] && responses[p[1]]) {
                if(p[2] && responses[p[0]] !== responses[p[1]]) cohErr++;
            }
        });
        document.getElementById('st-coh').innerText = (100 - (cohErr * 15)) + "%";

        // Lie
        let lie = 0;
        lieItems.forEach(i => { if(responses[i] === 'V') lie++; });
        document.getElementById('st-lie').innerText = lie > 2 ? "SOSPETTO" : "OK";

        // Tempi
        document.getElementById('st-time').innerText = reactionTimes.filter(t => t > 7).length;

        // Critiche
        let crit = 0;
        critItems.forEach(i => { if(responses[i] === 'V') crit++; });
        document.getElementById('st-crit').innerText = crit;

        // Grid
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        responses.forEach((r, i) => {
            let d = document.createElement('div');
            d.className = "tile " + (r === 'V' ? 't-v' : r === 'F' ? 't-f' : 't-n');
            if(critItems.includes(i) && r === 'V') d.classList.add('t-crit');
            d.innerText = i+1;
            d.onclick = () => { currentIdx = i; closeReview(); };
            grid.appendChild(d);
        });
    }

    function closeReview() {
        isReviewing = false;
        document.getElementById('test-screen').style.display = "block";
        document.getElementById('review-screen').style.display = "none";
        render();
    }

    function startRecover() {
        missingQueue = [];
        responses.forEach((r, i) => { if(r === null) missingQueue.push(i); });
        if(missingQueue.length > 0) {
            isRecovering = true;
            currentIdx = missingQueue[0];
            closeReview();
        }
    }

    function downloadReport() {
        let txt = "REPORT MMPI-2 ANALYZER\n";
        txt += "Tempo Totale: " + updateTimerDisplay() + "\n";
        txt += "Coerenza VRIN: " + document.getElementById('st-coh').innerText + "\n\n";
        responses.forEach((r, i) => {
            txt += `${i+1}. ${r || '??'} (Tempo: ${reactionTimes[i]}s)\n`;
        });
        const blob = new Blob([txt], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "Report_MMPI2_Completo.txt";
        a.click();

// Configurazione scale: Indice domanda (0-566) e risposta attesa
// ==========================================
// ANALISI CLINICA INTEGRATA (NON TOCCARE)
// ==========================================
const scaleKeys = {
    'L': { v: [], f: [16, 29, 41, 51, 77, 93, 102, 107, 123, 139, 153, 183, 203, 232, 260], kWeight: 0 },
    'F': { v: [14, 22, 31, 38, 48, 56, 65, 85, 92, 106, 115, 120, 150, 156, 168, 179, 197, 206, 209, 215, 218, 227, 246, 252, 256, 269, 281, 291, 303, 311], f: [], kWeight: 0 },
    'K': { v: [96], f: [30, 39, 58, 76, 110, 130, 157, 158, 167, 193, 213, 243, 244, 258, 259, 263, 267, 274, 286, 314, 315, 316, 338, 341, 348, 356, 365, 476, 543], kWeight: 0 },
    'Hs': { v: [33, 59, 111, 117, 175, 181, 226], f: [2, 3, 7, 8, 10, 13, 17, 20, 45, 143, 152, 164, 173, 176, 179, 208, 224, 249, 255], kWeight: 0.5 },
    'D': { v: [5, 15, 18, 22, 25, 37, 38, 41, 67, 117, 127, 143, 175, 181, 188, 189, 193, 209, 221, 226, 233, 248, 250, 252], f: [2, 8, 9, 10, 20, 29, 33, 35, 43, 45, 49, 51, 57, 58, 75, 76, 95, 104, 107, 109, 118, 135, 140, 141, 142, 147, 152, 153, 154, 155, 212, 242, 267], kWeight: 0 },
    'Pd': { v: [17, 21, 22, 31, 32, 34, 35, 38, 71, 82, 91, 94, 99, 102, 105, 190, 209, 214, 215, 216, 227, 245, 248, 254], f: [8, 9, 12, 13, 20, 33, 79, 83, 92, 101, 112, 113, 157, 158, 160, 167, 171, 185, 202, 235, 239, 244, 247, 264, 266, 267, 284, 437, 438, 442, 443], kWeight: 0.4 }
};

function getProfessionalAnalysis() {
    let rawScores = {};
    for (let scale in scaleKeys) {
        let score = 0;
        scaleKeys[scale].v.forEach(idx => { if(responses[idx-1] === 'V') score++; });
        scaleKeys[scale].f.forEach(idx => { if(responses[idx-1] === 'F') score++; });
        rawScores[scale] = score;
    }
    let kValue = rawScores.K || 0;
    let finalRaw = { ...rawScores };
    for (let scale in scaleKeys) {
        if (scaleKeys[scale].kWeight > 0) {
            finalRaw[scale] = Math.round((rawScores[scale] + (kValue * scaleKeys[scale].kWeight)) * 10) / 10;
        }
    }
    let htmlReport = `<div style="background:#fff; border:2px solid var(--p); padding:15px; border-radius:12px; margin-top:20px; color:#333;">
        <h3 style="color:var(--p); margin-top:0;">📊 Report Clinico MMPI-2</h3>
        <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
            <thead><tr style="background:#f0f0f0;"><th style="padding:8px; border:1px solid #ccc;">Scala</th><th style="padding:8px; border:1px solid #ccc;">Grezzo</th><th style="padding:8px; border:1px solid #ccc;">K-Corr</th><th style="padding:8px; border:1px solid #ccc;">Stato</th></tr></thead>
            <tbody>`;
    for (let scale in finalRaw) {
        let status = finalRaw[scale] > 20 ? `<span style="color:var(--f); font-weight:bold;">⚠️ Elevato</span>` : `<span style="color:var(--v);">✅ Normale</span>`;
        htmlReport += `<tr><td style="padding:8px; border:1px solid #ccc; font-weight:bold;">${scale}</td><td style="padding:8px; border:1px solid #ccc; text-align:center;">${rawScores[scale]}</td><td style="padding:8px; border:1px solid #ccc; text-align:center;">${finalRaw[scale]}</td><td style="padding:8px; border:1px solid #ccc; text-align:center;">${status}</td></tr>`;
    }
    htmlReport += `</tbody></table></div>`;
    return htmlReport;
}

const originalOpenReview = openReview;
openReview = function() {
    originalOpenReview();
    let old = document.getElementById('prof-analysis');
    if(old) old.remove();
    const div = document.createElement('div');
    div.id = 'prof-analysis';
    div.innerHTML = getProfessionalAnalysis() + getScalesLegenda();
    document.getElementById('review-screen').appendChild(div);
};

function getScalesLegenda() {

                    • <b>L (Lie):</b> Tendenza a mostrare un'immagine di sé idealizzata.<br>
                    • <b>F (Frequency):</b> Risposte insolite o disagio psicologico acuto.<br>
                    • <b>K (Correction):</b> Difensività o capacità di controllo emotivo.
                </div>
                <div>
                    <b style="color:var(--p);">CLINICHE:</b><br>

                    • <b>D (Depressione):</b> Stato di scoraggiamento e bassa autostima.<br>
                    • <b>Pd (Deviazione Psicopatica):</b> Insofferenza verso le regole e autorità.

        </div>
    `;
}
